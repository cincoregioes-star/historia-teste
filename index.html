<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>História Teste Grátis - Gabarito Max</title>
  <style>
    :root{
      --bg:#05070c;
      --card:#11141b;
      --card2:#171b24;
      --blue:#00f3ff;
      --pink:#ff00e6;
      --green:#39ff14;
      --red:#ff003c;
      --yellow:#ffd400;
      --text:#ffffff;
      --muted:#cfcfcf;
      --line:rgba(255,255,255,.08);
      --lock:#6b7280;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#000;
      color:var(--text);
      min-height:100vh;
      padding:20px 12px 40px;
      text-align:center;
      overflow-x:hidden;
    }

    header{
      max-width:1100px;
      margin:0 auto 24px;
      border:2px solid var(--blue);
      border-radius:24px;
      padding:22px 16px;
      background:linear-gradient(180deg,#0c0f16,#090b11);
      box-shadow:0 0 22px rgba(0,243,255,.22);
    }

    header h1{
      color:var(--blue);
      font-size:clamp(2rem,4vw,3rem);
      text-shadow:0 0 14px rgba(0,243,255,.7);
      font-weight:900;
    }

    header p{
      margin-top:10px;
      color:var(--pink);
      font-weight:800;
      font-size:clamp(1rem,2vw,1.3rem);
    }

    #app{
      width:100%;
      max-width:1100px;
      margin:0 auto;
    }

    .box{
      width:100%;
      max-width:100%;
      background:linear-gradient(180deg,var(--card),var(--card2));
      border:1px solid var(--line);
      border-radius:20px;
      padding:20px 16px;
      box-shadow:0 0 20px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .btn{
      display:block;
      width:100%;
      max-width:560px;
      margin:10px auto;
      padding:14px 16px;
      border:2px solid var(--blue);
      background:transparent;
      color:#fff;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
      font-size:1rem;
      line-height:1.45;
      transition:.2s;
      white-space:normal;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .btn:hover:not(:disabled){
      background:var(--blue);
      color:#000;
      box-shadow:0 0 18px rgba(0,243,255,.35);
    }

    .btn-lock{
      border-color:var(--lock);
      color:#d1d5db;
      background:rgba(255,255,255,.03);
    }

    .btn-lock:hover{
      background:rgba(255,255,255,.08);
      color:#fff;
      box-shadow:none;
    }

    .btn-premium{
      border-color:var(--yellow);
      color:var(--yellow);
    }

    .btn-premium:hover:not(:disabled){
      background:var(--yellow);
      color:#000;
      box-shadow:0 0 18px rgba(255,212,0,.35);
    }

    .btn-voltar{
      border-color:#666;
      color:#ddd;
    }

    .btn-voltar:hover:not(:disabled){
      background:#333;
      color:#fff;
      box-shadow:none;
    }

    .btn.correct{
      background:var(--green)!important;
      border-color:var(--green)!important;
      color:#000!important;
    }

    .btn.wrong{
      background:var(--red)!important;
      border-color:var(--red)!important;
      color:#fff!important;
    }

    .grid-areas{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:18px;
    }

    .card-area{
      background:linear-gradient(135deg, rgba(0,243,255,.08), rgba(255,0,230,.08));
      border:1px solid rgba(0,243,255,.16);
      border-radius:16px;
      padding:16px;
      text-align:left;
      min-width:0;
    }

    .card-area.locked{
      background:linear-gradient(135deg, rgba(107,114,128,.10), rgba(55,65,81,.12));
      border-color:rgba(107,114,128,.25);
    }

    .card-area h3{
      color:var(--blue);
      margin-bottom:8px;
      font-size:1.12rem;
      line-height:1.35;
      word-break:break-word;
    }

    .card-area.locked h3{
      color:#d1d5db;
    }

    .card-area p{
      color:#ddd;
      font-size:.95rem;
      line-height:1.45;
      margin-bottom:10px;
      word-break:break-word;
    }

    .status{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
      color:var(--pink);
      font-weight:bold;
      text-align:left;
    }

    #question-text{
      font-size:1.05rem;
      line-height:1.6;
      margin:20px 0;
      min-height:88px;
      text-align:left;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .question-label{
      display:block;
      color:var(--yellow);
      font-weight:bold;
      margin-bottom:8px;
    }

    .text-base{
      display:block;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:14px;
      margin:10px 0 14px;
      color:#f5f5f5;
      font-style:italic;
      line-height:1.65;
    }

    .options-wrap{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-bottom:16px;
      width:100%;
      max-width:100%;
    }

    .option-btn{
      width:100%;
      max-width:100%;
      margin:0;
      text-align:left;
      min-height:58px;
    }

    .result-number{
      font-size:3rem;
      color:var(--blue);
      margin:12px 0;
      font-weight:900;
    }

    .result-sub{
      font-size:1.12rem;
      color:#ddd;
      margin-bottom:10px;
    }

    .mini{
      color:var(--muted);
      font-size:.96rem;
      line-height:1.5;
    }

    .lock-box{
      max-width:780px;
      margin:0 auto;
      background:linear-gradient(135deg, rgba(255,212,0,.10), rgba(255,0,230,.10));
      border:1px solid rgba(255,212,0,.25);
      border-radius:20px;
      padding:28px 18px;
      box-shadow:0 0 20px rgba(255,212,0,.12);
    }

    .lock-box h2{
      color:var(--yellow);
      font-size:2rem;
      margin-bottom:14px;
    }

    .lock-box p{
      color:#f3f4f6;
      line-height:1.6;
      margin-bottom:12px;
    }

    @media (max-width:700px){
      .grid-areas{
        grid-template-columns:1fr;
      }
      .box{
        padding:16px 12px;
      }
      #question-text{
        font-size:1rem;
      }
      .btn{
        font-size:.96rem;
        padding:13px 12px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>HISTÓRIA TESTE GRÁTIS</h1>
  <p>TESTE: 2 MÓDULOS LIBERADOS • 10 QUESTÕES CADA • PREMIUM: 10 MÓDULOS E 200 QUESTÕES</p>
</header>

<div id="app"></div>

<audio id="audio-bg" loop preload="auto" playsinline>
  <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=tension-103701.mp3" type="audio/mpeg">
</audio>

<audio id="audio-correct" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=success-1-6297.mp3" type="audio/mpeg">
</audio>

<audio id="audio-wrong" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3?filename=error-126627.mp3" type="audio/mpeg">
</audio>

<script>
const PREMIUM_URL = "https://pay.kiwify.com.br/h8GJzVE";

const app = document.getElementById("app");
const audioBg = document.getElementById("audio-bg");
const audioCorrect = document.getElementById("audio-correct");
const audioWrong = document.getElementById("audio-wrong");

audioBg.volume = 0.06;
audioCorrect.volume = 0.45;
audioWrong.volume = 0.45;

let audioLiberado = false;
let areaAtual = "";
let questoesAtuais = [];
let indiceQuestao = 0;
let acertosObjetivas = 0;
let questaoRenderizadaAtual = null;

document.addEventListener("click", destravarAudio, { once: true });
document.addEventListener("touchstart", destravarAudio, { once: true });

function destravarAudio() {
  if (audioLiberado) return Promise.resolve(true);

  audioBg.muted = true;
  return audioBg.play()
    .then(() => {
      audioBg.pause();
      audioBg.currentTime = 0;
      audioBg.muted = false;
      audioLiberado = true;

      audioCorrect.play().then(() => {
        audioCorrect.pause();
        audioCorrect.currentTime = 0;
      }).catch(() => {});

      audioWrong.play().then(() => {
        audioWrong.pause();
        audioWrong.currentTime = 0;
      }).catch(() => {});

      return true;
    })
    .catch(() => false);
}

function tocarAudioFundo() {
  if (!audioLiberado) return;
  audioBg.currentTime = 0;
  audioBg.play().catch(() => {});
}

function pararAudioFundo() {
  audioBg.pause();
  audioBg.currentTime = 0;
}

function tocarAcerto() {
  audioCorrect.currentTime = 0;
  audioCorrect.play().catch(() => {});
}

function tocarErro() {
  audioWrong.currentTime = 0;
  audioWrong.play().catch(() => {});
}

const areas = [
  { nome: "História Antiga", descricao: "Módulo liberado no teste grátis.", liberada: true },
  { nome: "História Medieval", descricao: "Módulo liberado no teste grátis.", liberada: true },
  { nome: "História Moderna", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Brasil Colonial", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Brasil Império", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Brasil República", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "História Contemporânea", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Guerras e Revoluções", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "África, Américas e Povos Indígenas", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "História no ENEM", descricao: "Disponível apenas na versão premium.", liberada: false }
];

function criarObjetiva(area, numero, textoBase, pergunta, alternativas, correta) {
  return {
    tipo: "objetiva",
    area,
    numero,
    base: textoBase,
    q: pergunta,
    o: alternativas,
    c: correta
  };
}

function gerarAreaBase(nomeArea, perguntasObjetivas) {
  return perguntasObjetivas.map((item, i) =>
    criarObjetiva(nomeArea, i + 1, item.base, item.q, item.o, item.c)
  );
}

function embaralharAlternativas(questao) {
  const pares = questao.o.map((texto, idx) => ({ texto, correta: idx === questao.c }));
  for (let i = pares.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pares[i], pares[j]] = [pares[j], pares[i]];
  }
  return {
    ...questao,
    opcoesRenderizadas: pares.map(p => p.texto),
    corretaRenderizada: pares.findIndex(p => p.correta)
  };
}

const bancoQuestoes = {
  "História Antiga": gerarAreaBase(
    "História Antiga",
    [
      {
        base:`"As primeiras civilizações surgiram próximas a grandes rios, onde havia fertilidade, água e melhores condições para agricultura."`,
        q:"A relação entre rios e civilizações antigas está ligada principalmente à:",
        o:["Facilidade para agricultura e abastecimento","Ausência de organização social","Proibição do comércio","Eliminação das cidades"],
        c:0
      },
      {
        base:`"Na Mesopotâmia, povos como sumérios, acádios, babilônios e assírios desenvolveram cidades, leis e escrita."`,
        q:"Uma importante contribuição mesopotâmica para a História foi:",
        o:["A escrita cuneiforme","A imprensa moderna","A Revolução Industrial","A democracia contemporânea"],
        c:0
      },
      {
        base:`"O Código de Hamurábi reunia leis da antiga Babilônia e ficou conhecido pela ideia de punição proporcional ao delito."`,
        q:"Esse código ficou associado à:",
        o:["Lei de talião","Igualdade plena entre todos","Soberania popular","Separação entre Igreja e Estado"],
        c:0
      },
      {
        base:`"No Egito Antigo, o faraó concentrava poder político e religioso, sendo visto como figura sagrada."`,
        q:"O faraó era considerado:",
        o:["Governante com poder político e religioso","Representante eleito pelos camponeses","Chefe sem autoridade religiosa","Apenas comerciante"],
        c:0
      },
      {
        base:`"A mumificação egípcia estava relacionada às crenças sobre a vida após a morte."`,
        q:"A prática da mumificação revela:",
        o:["Crença na continuidade da vida após a morte","Negação da religião","Desinteresse pela alma","Rejeição aos rituais funerários"],
        c:0
      },
      {
        base:`"A pólis grega era uma cidade-Estado com governo, leis e organização própria."`,
        q:"Na Grécia Antiga, pólis significava:",
        o:["Cidade-Estado autônoma","Império mundial centralizado","Aldeia sem leis","Colônia romana"],
        c:0
      },
      {
        base:`"A democracia ateniense permitia participação direta dos cidadãos, mas excluía mulheres, escravos e estrangeiros."`,
        q:"A democracia ateniense era:",
        o:["Restrita a determinados cidadãos homens","Universal como a atual","Comandada por faraós","Baseada apenas em reis hereditários"],
        c:0
      },
      {
        base:`"Esparta valorizava disciplina, treinamento militar e obediência à cidade."`,
        q:"Uma característica de Esparta era:",
        o:["Militarismo e disciplina rígida","Democracia direta ampla","Ausência de exército","Valorização exclusiva do comércio marítimo"],
        c:0
      },
      {
        base:`"Roma passou por monarquia, república e império, deixando importante legado jurídico e político."`,
        q:"Uma contribuição romana duradoura foi:",
        o:["O desenvolvimento do direito","A invenção da máquina a vapor","O feudalismo europeu","A internet"],
        c:0
      },
      {
        base:`"A crise do Império Romano envolveu problemas econômicos, políticos, militares e pressões de povos germânicos."`,
        q:"Entre os fatores da crise romana, pode-se citar:",
        o:["Instabilidade política e pressão de povos germânicos","Colonização da América","Revolução Industrial","Expansão do café no Brasil"],
        c:0
      }
    ]
  ),

  "História Medieval": gerarAreaBase(
    "História Medieval",
    [
      {
        base:`"Após a crise do Império Romano do Ocidente, a Europa passou por ruralização e fragmentação política."`,
        q:"O feudalismo formou-se nesse contexto de:",
        o:["Ruralização e fragmentação política","Industrialização acelerada","Globalização financeira","Democracia de massas"],
        c:0
      },
      {
        base:`"No feudalismo, a terra era a principal fonte de riqueza e poder."`,
        q:"A base econômica feudal era:",
        o:["Agrária e senhorial","Industrial e assalariada","Financeira e bancária","Digital e global"],
        c:0
      },
      {
        base:`"A sociedade feudal era hierarquizada, com pouca mobilidade social."`,
        q:"A ordem social medieval era frequentemente dividida em:",
        o:["Clero, nobreza e servos","Burguesia, proletariado e banqueiros","Patrícios e plebeus","Presidentes e ministros"],
        c:0
      },
      {
        base:`"Os servos trabalhavam nas terras senhoriais e deviam obrigações ao senhor feudal."`,
        q:"Uma obrigação servil era:",
        o:["Corveia","Voto secreto","Salário mínimo","Participação em sindicatos"],
        c:0
      },
      {
        base:`"A Igreja Católica exerceu grande influência política, cultural e social durante a Idade Média."`,
        q:"Na Europa medieval, a Igreja:",
        o:["Tinha forte influência sobre a sociedade","Foi totalmente afastada da política","Não possuía terras","Defendia o ateísmo estatal"],
        c:0
      },
      {
        base:`"As Cruzadas foram expedições militares e religiosas realizadas entre os séculos XI e XIII."`,
        q:"Um objetivo declarado das Cruzadas era:",
        o:["Retomar lugares considerados sagrados pelos cristãos","Criar fábricas na Inglaterra","Defender a independência americana","Implantar democracia ateniense"],
        c:0
      },
      {
        base:`"O crescimento comercial e urbano contribuiu para mudanças na Baixa Idade Média."`,
        q:"A Baixa Idade Média foi marcada por:",
        o:["Renascimento comercial e urbano","Fim de todas as cidades","Desaparecimento do comércio","Criação da internet"],
        c:0
      },
      {
        base:`"As corporações de ofício regulavam o trabalho artesanal nas cidades medievais."`,
        q:"As corporações de ofício controlavam:",
        o:["Produção artesanal, qualidade e aprendizagem","Voto feminino","Comércio de petróleo","Eleições presidenciais"],
        c:0
      },
      {
        base:`"A peste negra atingiu a Europa no século XIV e provocou grande mortalidade."`,
        q:"Uma consequência da peste negra foi:",
        o:["Crise demográfica e social","Crescimento imediato da população","Fim das tensões econômicas","Expansão industrial automobilística"],
        c:0
      },
      {
        base:`"O islamismo surgiu na Península Arábica no século VII e expandiu-se rapidamente."`,
        q:"O fundador do islamismo foi:",
        o:["Maomé","Constantino","Carlos Magno","Lutero"],
        c:0
      }
    ]
  )
};

function irParaPremium() {
  if (!PREMIUM_URL || PREMIUM_URL.includes("COLE_AQUI")) {
    alert("Link premium não configurado.");
    return;
  }
  window.open(PREMIUM_URL, "_blank", "noopener");
}

function mostrarMenu() {
  pararAudioFundo();

  app.innerHTML = `
    <div class="box">
      <h2 style="color:var(--blue); margin-bottom:8px;">Escolha um módulo de História</h2>
      <p class="mini">No teste grátis você libera <strong>2 módulos com 10 questões cada</strong>. Na versão premium você desbloqueia <strong>10 módulos e 200 questões</strong>.</p>

      <div class="grid-areas">
        ${areas.map(area => `
          <div class="card-area ${area.liberada ? "" : "locked"}">
            <h3>${area.liberada ? area.nome : "🔒 " + area.nome}</h3>
            <p>${area.descricao}</p>
            <button class="btn ${area.liberada ? "" : "btn-lock"}" onclick="${area.liberada ? `iniciarArea('${area.nome.replace(/'/g, "\\'")}')` : `mostrarBloqueio()`}">
              ${area.liberada ? "Entrar neste módulo" : "Desbloquear no premium"}
            </button>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function mostrarBloqueio() {
  pararAudioFundo();

  app.innerHTML = `
    <div class="lock-box">
      <h2>🔒 MÓDULO PREMIUM</h2>
      <p>Esse módulo está disponível apenas na versão completa do simulado de História.</p>
      <p>No premium você desbloqueia <strong>10 módulos</strong> e <strong>200 questões completas</strong>.</p>
      <button class="btn btn-premium" onclick="irParaPremium()">LIBERAR ACESSO COMPLETO</button>
      <button class="btn btn-voltar" onclick="mostrarMenu()">VOLTAR AO MENU</button>
    </div>
  `;
}

async function iniciarArea(nomeArea) {
  await destravarAudio();
  areaAtual = nomeArea;
  questoesAtuais = bancoQuestoes[nomeArea] || [];
  indiceQuestao = 0;
  acertosObjetivas = 0;
  questaoRenderizadaAtual = null;

  if (!questoesAtuais.length) {
    app.innerHTML = `
      <div class="box">
        <h2 style="color:var(--red);">Erro ao abrir o módulo</h2>
        <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
      </div>
    `;
    return;
  }

  setTimeout(() => {
    tocarAudioFundo();
  }, 120);

  carregarQuestao();
}

function montarEnunciado(questao) {
  return `
    <span class="question-label">Base para interpretação:</span>
    <span class="text-base">${questao.base}</span>
    <span class="question-label">Pergunta:</span>
    ${questao.q}
  `;
}

function carregarQuestao() {
  const questao = questoesAtuais[indiceQuestao];
  const total = questoesAtuais.length;
  questaoRenderizadaAtual = embaralharAlternativas(questao);

  let html = `
    <div class="box">
      <div class="status">
        <span>${areaAtual}</span>
        <span>Questão ${indiceQuestao + 1}/${total}</span>
      </div>
      <div id="question-text">${montarEnunciado(questaoRenderizadaAtual)}</div>
      <div class="options-wrap">
  `;

  questaoRenderizadaAtual.opcoesRenderizadas.forEach((alt, idx) => {
    html += `<button class="btn option-btn" onclick="responderObjetiva(${idx})">${alt}</button>`;
  });

  html += `
      </div>
      <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
    </div>
  `;

  app.innerHTML = html;
}

function responderObjetiva(escolhida) {
  const botoes = document.querySelectorAll(".option-btn");
  const correta = questaoRenderizadaAtual.corretaRenderizada;

  botoes.forEach((btn, idx) => {
    btn.disabled = true;
    if (idx === correta) btn.classList.add("correct");
  });

  if (escolhida === correta) {
    acertosObjetivas++;
    tocarAcerto();
  } else {
    botoes[escolhida].classList.add("wrong");
    tocarErro();
  }

  setTimeout(() => {
    indiceQuestao++;
    if (indiceQuestao < questoesAtuais.length) {
      carregarQuestao();
    } else {
      finalizarArea();
    }
  }, 900);
}

function finalizarArea() {
  pararAudioFundo();

  const notaFinal = acertosObjetivas * 10;
  const totalPossivel = 200;

  let feedback = "Você concluiu uma amostra do Simulado História ENEM. A versão premium possui 10 módulos e 200 questões.";

  if (notaFinal >= 80) {
    feedback += " Ótimo resultado no teste grátis. Você já pode avançar para o premium.";
  } else if (notaFinal >= 50) {
    feedback += " Bom começo. No premium você treina o restante dos módulos.";
  } else {
    feedback += " Esse teste já mostrou onde melhorar. O premium ajuda a evoluir com treino completo.";
  }

  app.innerHTML = `
    <div class="box">
      <h2 style="color:var(--blue);">${areaAtual}</h2>
      <div class="result-number">${notaFinal}/${totalPossivel}</div>
      <div class="result-sub">Acertos: ${acertosObjetivas}/10</div>
      <p class="mini" style="margin-bottom:18px;">${feedback}</p>

      <button class="btn btn-premium" onclick="irParaPremium()">DESBLOQUEAR VERSÃO COMPLETA</button>
      <button class="btn" onclick="iniciarArea('${areaAtual.replace(/'/g, "\\'")}')">Refazer este módulo</button>
      <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
    </div>
  `;
}

mostrarMenu();
</script>

</body>
</html>
